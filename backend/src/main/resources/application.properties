spring.application.name=smart-agriculture-platform

# Database Configuration
spring.datasource.url=${AGRI_DB_URL}
spring.datasource.username=${AGRI_DB_USER}
spring.datasource.password=${AGRI_DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
javax.net.ssl.trustStore=C:\isrgrootx1.pem

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# File Upload (for disease detection images)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ML Service Endpoints (External Python/Flask API)
ml.service.crop-recommendation.url=${CROP_API}
ml.service.disease-detection.url=${DISEASE_API}

# Weather API (OpenWeatherMap)
weather.api.key=${WHETHER_API_KEY}
weather.api.url=${WHEATHER_API_URI}

# Cloudinary Configuration
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

# Logging Configuration
logging.level.root=INFO
logging.level.com.smartagri=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
